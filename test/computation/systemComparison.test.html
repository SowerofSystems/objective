<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Computation System - Unit Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #fff;
      border-bottom: 2px solid #333;
      padding-bottom: 0.5rem;
    }
    h2 {
      color: #ccc;
      margin-top: 2rem;
    }
    .controls {
      margin: 1rem 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      padding: 0.5rem 1rem;
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #444;
    }
    button.primary {
      background: #2563eb;
      border-color: #1d4ed8;
    }
    button.primary:hover {
      background: #1d4ed8;
    }
    .info {
      color: #888;
      font-size: 0.9rem;
      margin: 1rem 0;
    }
    .summary {
      font-size: 1.2rem;
      margin: 1rem 0;
      padding: 0.75rem;
      border-radius: 4px;
    }
    .summary.pass {
      background: #064e3b;
      border: 1px solid #059669;
    }
    .summary.fail {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 13px;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th {
      background: #252525;
      color: #fff;
      font-weight: 600;
    }
    tr:hover {
      background: #252525;
    }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; background: #3f1f1f; }
    .info { color: #60a5fa; }
    .field-path { color: #888; font-family: monospace; font-size: 11px; }
    .value { font-family: monospace; }
    #log {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 1rem;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>New Computation System - Unit Tests</h1>

  <p class="info">
    Tests the new MultiModelEngine computation system with known inputs and expected outputs.
  </p>

  <div class="controls">
    <button id="runBtn" class="primary">Run Tests</button>
  </div>

  <div id="summary" class="summary" style="display: none;"></div>

  <h2>Test Results</h2>
  <table>
    <thead>
      <tr>
        <th>Test</th>
        <th>Semantic Path</th>
        <th>Expected</th>
        <th>Actual</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

  <h2>Log</h2>
  <div id="log"></div>

  <!-- Load computation modules -->
  <script src="../../src/core/computation/types.js"></script>
  <script src="../../src/core/computation/ComputationGraph.js"></script>
  <script src="../../src/core/model/ModelMetadata.js"></script>
  <script src="../../src/core/model/MultiModelState.js"></script>
  <script src="../../src/core/model/MultiModelEngine.js"></script>
  <script src="../../src/core/computation/FieldRegistry.js"></script>

  <!-- Load climate data -->
  <script src="../../src/core/ClimateValues.js"></script>

  <!-- Load section nodes -->
  <script src="../../src/sections/nodes/ClimateNodes.js"></script>
  <script src="../../src/sections/nodes/BuildingInfoNodes.js"></script>
  <script src="../../src/sections/nodes/MechanicalNodes.js"></script>
  <script src="../../src/sections/nodes/SpaceHeatingNodes.js"></script>
  <script src="../../src/sections/nodes/WaterHeatingNodes.js"></script>
  <script src="../../src/sections/nodes/RenewableNodes.js"></script>
  <script src="../../src/sections/nodes/EnergyNodes.js"></script>
  <script src="../../src/sections/nodes/ForestryNodes.js"></script>
  <script src="../../src/sections/nodes/EmissionsNodes.js"></script>
  <script src="../../src/sections/nodes/OccupancyNodes.js"></script>
  <script src="../../src/sections/nodes/KeyValuesNodes.js"></script>

  <script>
    const logEl = document.getElementById('log');
    const summaryEl = document.getElementById('summary');
    const resultsBody = document.getElementById('results');

    function log(msg) {
      logEl.textContent += msg + '\n';
      console.log(msg);
    }

    function clearResults() {
      logEl.textContent = '';
      summaryEl.style.display = 'none';
      resultsBody.innerHTML = '';
    }

    // Test inputs with known values
    const TEST_INPUTS = {
      // Geometry
      'geometry.conditionedFloorArea': 5000,
      'geometry.numStoreys': 2,
      'geometry.ceilingHeight': 3.0,

      // Climate - Toronto
      'climate.location.province': 'ON',
      'climate.location.city': 'Toronto (City Hall)',
      'climate.timeframe': 'Current',

      // Envelope RSI values
      'envelope.roof.rsi': 5.0,
      'envelope.walls.rsi': 4.0,
      'envelope.wallsBelowGrade.rsi': 2.0,
      'envelope.slabOnGrade.rsi': 1.0,

      // Envelope U-values (direct input for windows/doors)
      'envelope.doors.uValue': 2.0,
      'envelope.windowsNorth.uValue': 1.4,
      'envelope.windowsEast.uValue': 1.4,
      'envelope.windowsSouth.uValue': 1.4,
      'envelope.windowsWest.uValue': 1.4,

      // Envelope Areas
      'envelope.roof.area': 500,
      'envelope.walls.area': 800,
      'envelope.wallsBelowGrade.area': 200,
      'envelope.slabOnGrade.area': 500,
      'envelope.doors.area': 20,
      'envelope.windowsNorth.area': 50,
      'envelope.windowsEast.area': 50,
      'envelope.windowsSouth.area': 100,
      'envelope.windowsWest.area': 50,

      // Mechanical
      'mechanical.heating.efficiency': 0.95,
      'mechanical.cooling.cop': 3.5,
    };

    // Expected outputs (calculated by hand or verified correct)
    const EXPECTED_OUTPUTS = [
      // Climate lookups (Toronto City Hall HDD from ClimateValues.js)
      { path: 'climate.heating.degreedays', expected: 4600, label: 'Heating Degree Days', tolerance: 0 },

      // U-value calculations (U = 1/RSI)
      { path: 'envelope.roof.uValue', expected: 0.2, label: 'Roof U-Value (1/5.0)', tolerance: 0.001 },
      { path: 'envelope.walls.uValue', expected: 0.25, label: 'Wall U-Value (1/4.0)', tolerance: 0.001 },
      { path: 'envelope.wallsBelowGrade.uValue', expected: 0.5, label: 'Below Grade U-Value (1/2.0)', tolerance: 0.001 },
      { path: 'envelope.slabOnGrade.uValue', expected: 1.0, label: 'Slab U-Value (1/1.0)', tolerance: 0.001 },

      // Weighted U-value for air-facing envelope
      { path: 'envelope.airFacing.weightedUValue', expected: null, label: 'Air-Facing Weighted U-Value', tolerance: 0.01 },

      // Total heat loss (aggregated, not per-component)
      { path: 'envelope.total.heatLoss', expected: null, label: 'Total Heat Loss', tolerance: 0.01 },
    ];

    function setupSystem() {
      log('Setting up computation system...');

      try {
        // Create computation graph
        const graph = window.TEUI.ComputationGraph.create();

        // Register all section nodes
        const nodes = window.TEUI.ComputationNodes || {};

        if (nodes.Climate) {
          nodes.Climate.register(graph);
          log('  Registered ClimateNodes');
        }
        if (nodes.BuildingInfo) {
          nodes.BuildingInfo.register(graph);
          log('  Registered BuildingInfoNodes');
        }
        // EnvelopeNodes removed - consolidated into TransmissionLossNodes + VolumeMetricsNodes
        if (nodes.Mechanical) {
          nodes.Mechanical.register(graph);
          log('  Registered MechanicalNodes');
        }
        if (nodes.SpaceHeating) {
          nodes.SpaceHeating.register(graph);
          log('  Registered SpaceHeatingNodes');
        }
        if (nodes.WaterHeating) {
          nodes.WaterHeating.register(graph);
          log('  Registered WaterHeatingNodes');
        }
        if (nodes.Renewable) {
          nodes.Renewable.register(graph);
          log('  Registered RenewableNodes');
        }
        if (nodes.Energy) {
          nodes.Energy.register(graph);
          log('  Registered EnergyNodes');
        }
        if (nodes.Forestry) {
          nodes.Forestry.register(graph);
          log('  Registered ForestryNodes');
        }
        if (nodes.Emissions) {
          nodes.Emissions.register(graph);
          log('  Registered EmissionsNodes');
        }
        if (nodes.Occupancy) {
          nodes.Occupancy.register(graph);
          log('  Registered OccupancyNodes');
        }
        if (nodes.KeyValues) {
          nodes.KeyValues.register(graph);
          log('  Registered KeyValuesNodes');
        }

        const stats = graph.getStats();
        log(`  Graph: ${stats.nodeCount} nodes, ${stats.inputCount} inputs`);

        // Create multi-model state
        const state = window.TEUI.MultiModelState.create();

        // Add target model
        const targetMeta = window.TEUI.ModelMetadata.createTarget('Test Target');
        state.addModel(targetMeta);

        // Create engine
        const engine = window.TEUI.MultiModelEngine.create({ state, graph });

        // Set all inputs
        state.initializeModelState(targetMeta.id, TEST_INPUTS);
        log(`  Set ${Object.keys(TEST_INPUTS).length} input values`);

        // Compute all
        const result = engine.computeAllForModel(targetMeta.id);
        log(`  Computed ${result.computedNodes} nodes in ${result.duration.toFixed(2)}ms`);

        return { state, engine, graph, modelId: targetMeta.id };
      } catch (e) {
        log('  ERROR: ' + e.message);
        console.error(e);
        return null;
      }
    }

    function runTests() {
      clearResults();
      log('=== Starting Unit Tests ===\n');

      const system = setupSystem();

      if (!system) {
        log('\nERROR: Could not set up system');
        summaryEl.style.display = 'block';
        summaryEl.className = 'summary fail';
        summaryEl.textContent = 'Failed to initialize system';
        return;
      }

      log('\n=== Running Tests ===\n');

      let passed = 0;
      let failed = 0;

      for (const test of EXPECTED_OUTPUTS) {
        const actual = system.state.getValue(test.path);
        const expected = test.expected;

        let status = 'fail';

        // If expected is null, just report the value (info only, counts as pass)
        if (expected === null) {
          status = 'info';
          log(`ℹ ${test.label}: ${actual}`);
        } else if (actual !== undefined && actual !== null) {
          if (typeof expected === 'number' && typeof actual === 'number') {
            const delta = Math.abs(actual - expected);
            const tolerance = test.tolerance || 0.01;
            if (delta <= tolerance || (expected !== 0 && delta / Math.abs(expected) <= tolerance)) {
              status = 'pass';
            }
          } else if (actual === expected) {
            status = 'pass';
          }
        }

        if (status === 'pass') {
          passed++;
          log(`✓ ${test.label}: ${actual}`);
        } else if (status === 'info') {
          passed++; // Info counts as pass
        } else {
          failed++;
          log(`✗ ${test.label}: expected ${expected}, got ${actual}`);
        }

        // Add to table
        const row = document.createElement('tr');
        const expectedDisplay = expected === null ? '(any)' : formatValue(expected);
        row.innerHTML = `
          <td>${test.label}</td>
          <td class="field-path">${test.path}</td>
          <td class="value">${expectedDisplay}</td>
          <td class="value">${formatValue(actual)}</td>
          <td class="${status}">${status.toUpperCase()}</td>
        `;
        resultsBody.appendChild(row);
      }

      log(`\n=== Tests Complete ===`);
      log(`Passed: ${passed}, Failed: ${failed}`);

      summaryEl.style.display = 'block';
      if (failed === 0) {
        summaryEl.className = 'summary pass';
        summaryEl.textContent = `All ${passed} tests passed!`;
      } else {
        summaryEl.className = 'summary fail';
        summaryEl.textContent = `${failed} of ${passed + failed} tests failed`;
      }
    }

    function formatValue(val) {
      if (val === undefined) return '<span style="color:#666">undefined</span>';
      if (val === null) return '<span style="color:#666">null</span>';
      if (typeof val === 'number') {
        if (isNaN(val)) return '<span style="color:#666">NaN</span>';
        return val.toLocaleString(undefined, { maximumFractionDigits: 4 });
      }
      return String(val);
    }

    // Event handlers
    document.getElementById('runBtn').addEventListener('click', runTests);

    // Auto-run on load
    window.addEventListener('load', () => {
      setTimeout(runTests, 100);
    });
  </script>
</body>
</html>
