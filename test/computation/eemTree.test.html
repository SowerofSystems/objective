<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEM Tree Manager Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #fff;
      border-bottom: 2px solid #333;
      padding-bottom: 0.5rem;
    }
    .controls {
      margin: 1rem 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      padding: 0.5rem 1rem;
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #444;
    }
    button.primary {
      background: #2563eb;
      border-color: #1d4ed8;
    }
    button.primary:hover {
      background: #1d4ed8;
    }
    #results {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 1rem;
      margin-top: 1rem;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 600px;
      overflow-y: auto;
    }
    .summary {
      font-size: 1.2rem;
      margin: 1rem 0;
      padding: 0.75rem;
      border-radius: 4px;
    }
    .summary.pass {
      background: #064e3b;
      border: 1px solid #059669;
    }
    .summary.fail {
      background: #7f1d1d;
      border: 1px solid #dc2626;
    }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; }
    .info {
      color: #888;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>EEM Tree Manager Tests</h1>

  <p class="info">
    Tests for: EEMTreeManager, prototypal inheritance, baselines, active EEM management
  </p>

  <div class="controls">
    <button class="primary" onclick="runAllTests()">Run All Tests</button>
    <button onclick="runSuite('EEMTreeManager')">Tree Manager</button>
    <button onclick="runSuite('Prototypal Inheritance')">Inheritance</button>
    <button onclick="runSuite('Active EEM')">Active EEM</button>
    <button onclick="runSuite('Baselines')">Baselines</button>
    <button onclick="runSuite('Tree Operations')">Operations</button>
    <button onclick="runSuite('Listeners')">Listeners</button>
  </div>

  <div id="summary" class="summary" style="display: none;"></div>
  <div id="results"></div>

  <!-- Load EEM Tree Manager module -->
  <script src="../../src/core/model/EEMTreeManager.js"></script>

  <!-- Load tests -->
  <script src="eemTree.test.js"></script>

  <script>
    const resultsEl = document.getElementById('results');
    const summaryEl = document.getElementById('summary');

    const originalLog = console.log;
    const originalError = console.error;

    function captureConsole() {
      resultsEl.textContent = '';

      console.log = function(...args) {
        originalLog.apply(console, args);
        const text = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
        const span = document.createElement('span');
        if (text.includes('passed')) span.className = 'pass';
        else if (text.includes('failed') || text.includes('❌')) span.className = 'fail';
        span.textContent = text + '\n';
        resultsEl.appendChild(span);
      };

      console.error = function(...args) {
        originalError.apply(console, args);
        const span = document.createElement('span');
        span.className = 'fail';
        span.textContent = 'ERROR: ' + args.join(' ') + '\n';
        resultsEl.appendChild(span);
      };
    }

    function showSummary(passed, failed) {
      summaryEl.style.display = 'block';
      summaryEl.className = 'summary ' + (failed > 0 ? 'fail' : 'pass');
      summaryEl.textContent = `${passed} passed, ${failed} failed`;
    }

    function runAllTests() {
      captureConsole();
      window.TEUI.EEMTreeManager.resetIdCounter();
      const result = window.TEUI.EEMTreeTests.runAll();
      showSummary(result.passed, result.failed);
    }

    function runSuite(name) {
      captureConsole();
      window.TEUI.EEMTreeManager.resetIdCounter();
      const result = window.TEUI.EEMTreeTests.runSuite(name);
      showSummary(result.passed, result.failed);
    }

    // Auto-run on load
    resultsEl.textContent = 'Click "Run All Tests" to execute EEM Tree Manager tests.';
  </script>
</body>
</html>
